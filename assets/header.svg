<svg xmlns="http://www.w3.org/2000/svg" width="860" height="180" viewBox="0 0 860 180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="180" rx="0" fill="#000000"/>

  <!-- Thin top accent line -->
  <rect x="0" y="0" width="860" height="2" fill="#ffffff" opacity="0.08"/>

  <!-- Name -->
  <text
    x="50"
